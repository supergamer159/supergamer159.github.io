<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arcade Vault</title>
    <link rel="stylesheet" href="styles/game.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <div>
          <p class="eyebrow">Classic Arcade Collection</p>
          <h1>Arcade Vault</h1>
        </div>
        <div class="header-actions">
          <button id="random-game-button" class="ghost-button" type="button">Random Game</button>
          <button id="restart-button" class="primary-button" type="button">Restart</button>
          <button id="pause-button" class="secondary-button" type="button">Pause</button>
        </div>
      </header>

      <main class="site-layout">
        <aside class="library-panel">
          <div class="panel-head">
            <div>
              <p class="eyebrow">Game Library</p>
              <h2>15 Playable Classics</h2>
            </div>
          </div>
          <div id="game-list" class="game-list"></div>
        </aside>

        <section class="play-panel">
          <div class="play-topbar">
            <div>
              <p class="eyebrow">Now Playing</p>
              <h2 id="game-title">Loading…</h2>
              <p id="game-tagline" class="muted"></p>
            </div>
            <div id="hud" class="hud-grid"></div>
          </div>

          <div class="canvas-frame">
            <canvas id="game-canvas" width="960" height="640" aria-label="Arcade game canvas"></canvas>
            <div id="overlay" class="overlay-panel"></div>
          </div>

          <div class="play-bottom">
            <article class="info-card">
              <p class="eyebrow">How To Play</p>
              <div id="instructions" class="instructions"></div>
            </article>

            <article class="info-card">
              <p class="eyebrow">About This Cabinet</p>
              <p id="game-description" class="muted"></p>
              <div id="scoreboard" class="scoreboard"></div>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="scripts/game.js"></script>
  </body>
</html>
