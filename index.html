<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Circuit Coliseum</title>
    <link rel="stylesheet" href="styles/game.css" />
  </head>
  <body>
    <div id="app" class="app-shell" aria-live="polite"></div>

    <div id="options-modal" class="modal-shell" hidden>
      <div class="modal-backdrop" data-action="close-options"></div>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="options-title">
        <header class="modal-header">
          <p class="eyebrow">System Utilities</p>
          <h2 id="options-title">Options</h2>
          <button class="ghost-button" type="button" data-action="close-options">Close</button>
        </header>

        <div id="options-content" class="modal-body"></div>
      </section>
    </div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="scripts/game.js"></script>
  </body>
</html>
